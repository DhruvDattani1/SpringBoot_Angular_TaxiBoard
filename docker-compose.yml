services:
  backend:
    image: dhruvd22/springboot-angular-taxiboard-backend:2.0
    container_name: backend
    restart: always
    environment:
      - SPRING_DATASOURCE_URL
      - SPRING_DATASOURCE_USERNAME
      - SPRING_DATASOURCE_PASSWORD
      - JWT_SECRET
    networks:
      - app-network

  frontend:
    image: dhruvd22/springboot-angular-taxiboard-frontend:2.0
    container_name: frontend
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: reverse-proxy
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  certbot-renew:
    image: certbot/certbot
    container_name: certbot-renew
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "while :; do
      certbot renew --webroot -w /var/www/certbot;
      sleep 12h;
      done"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge