server {
    listen 80;
    server_name dhruvdattani.info www.dhruvdattani.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend:80;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;

    }
}
